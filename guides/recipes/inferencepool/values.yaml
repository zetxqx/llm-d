inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/inference-serving: "true"
      # optional additional label for specific guide, ex: `llm-d.ai/guide: "inference-scheduling"
inferenceExtension:
  flags:
  # Distributed tracing configuration (OpenTelemetry)
  tracing:
    enabled: false
    # otelExporterEndpoint: "http://otel-collector:4317"
    # sampling:
    #   sampler: "parentbased_traceidratio"
    #   samplerArg: "0.1"
  monitoring:
    prometheus:
      enable: true
