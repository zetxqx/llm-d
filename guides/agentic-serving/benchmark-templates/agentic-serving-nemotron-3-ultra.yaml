# ---------------------------------------------------------------------------
# inference-perf workload template for the agentic-serving guide
# (NVIDIA-Nemotron-3-Ultra-550B on H200, P/D-disaggregated).
#
# This deployment carries its own realistic preset, tuned for it — a
# shared-prefix workload with large, highly cacheable system prompts and a
# ramped request rate that exercises cross-request prefix reuse and the
# CPU-offload tier under sustained load. It is not required to match the TPU
# deployment's preset; each deployment is benchmarked on what is realistic for
# its model and serving topology.
#
# Render with `envsubst < agentic-serving-nemotron-3-ultra.yaml > config.yaml`
# AFTER exporting the variables below. Any unset variable renders as an empty
# string, producing invalid or semantically wrong YAML — so set them first.
#
#   NAMESPACE  namespace where the stack is deployed
#   IP         EPP service ClusterIP (base_url = http://${IP})
# ---------------------------------------------------------------------------
endpoint:
  stack_name: &stack_name agentic-serving-Nemotron-3-Ultra-550B  # user defined name for the stack (results prefix)
  model: &model RedHatAI/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8-block  # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace ${NAMESPACE}  # Namespace where stack is deployed
  base_url: &url http://${IP}  # Base URL of inference endpoint (EPP service ClusterIP)
  hf_token_secret: llm-d-hf-token     # The name of secret that contains the HF token of the stack

control:
  work_dir: $HOME/llm-d-bench-work  # working directory to store temporary and autogenerated files.
                                    # Do not edit content manually.
                                    # If not set, a temp directory will be created.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: benchmark-results  # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1                  # Number of parallel workload launcher pods to create.
  wait_timeout: 6000              # Time (in seconds) to wait for workload launcher pod to complete before terminating.
                                  # Set to 0 to disable timeout.
  image: ghcr.io/llm-d/llm-d-benchmark:v0.6.0

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:
  agentic_shared_prefix:
    load:
      type: constant
      stages:
      - rate: 2
        duration: 120
      - rate: 4
        duration: 120
      - rate: 6
        duration: 120
      - rate: 8
        duration: 120
      - rate: 10
        duration: 120
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
    tokenizer:
      pretrained_model_name_or_path: RedHatAI/NVIDIA-Nemotron-3-Ultra-550B-A55B-FP8-block
    data:
      type: shared_prefix
      shared_prefix:
        num_groups: 10
        num_prompts_per_group: 50
        system_prompt_len: 3000
        question_len: 4000
        output_len: 1024
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
