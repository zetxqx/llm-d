# ---------------------------------------------------------------------------
# inference-perf workload template for the agentic-serving guide.
#
# Render with `envsubst < guide.yaml > config.yaml` AFTER exporting the
# variables below. Any unset variable renders as an empty string, producing
# invalid or semantically wrong YAML — so set all of them first.
#
# Per-run variables (see the guide's "Execute Benchmark" step):
#   CONCURRENCY_LEVEL  int  concurrent coding sessions to drive; also sets
#                           num_conversations. Published sweep: 5..80.
#   NUM_REQUESTS       int  total requests for the stage.
#                           Convention: 20 * CONCURRENCY_LEVEL.
#   SEED               int  RNG seed for prompt generation. Use a DISTINCT seed
#                           per concurrency (convention: 7 + CONCURRENCY_LEVEL)
#                           so prompt sets don't overlap across runs and warm
#                           each other's prefix cache.
#
# Environment variables (set by earlier guide steps):
#   NAMESPACE      namespace where the stack is deployed
#   IP             EPP service ClusterIP (base_url = http://${IP})
#   BENCHMARK_PVC  PVC name where benchmark results are stored
# ---------------------------------------------------------------------------
endpoint:
  stack_name: &stack_name agentic-serving-Qwen3-Coder-480B  # user defined name for the stack (results prefix)
  model: &model Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8        # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace ${NAMESPACE}  # Namespace where stack is deployed
  base_url: &url http://${IP}  # Base URL of inference endpoint
  hf_token_secret: llm-d-hf-token     # The name of secret that contains the HF token of the stack

control:
  work_dir: $HOME/llm-d-bench-work  # working directory to store temporary and autogenerated files.
                                    # Do not edit content manually.
                                    # If not set, a temp directory will be created.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: ${BENCHMARK_PVC}   # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1                  # Number of parallel workload launcher pods to create.
  wait_timeout: 6000              # Time (in seconds) to wait for workload launcher pod to complete before terminating.
                                  # Set to 0 to disable timeout.
  image: ghcr.io/llm-d/llm-d-benchmark:v0.7.0

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:                         # yaml configuration for harness workload(s)
  Agentic_Workload:
    load:
      type: concurrent
      num_workers: 8
      worker_max_concurrency: 1000
      request_timeout: 600
      stages:
      - num_requests: ${NUM_REQUESTS}
        concurrency_level: ${CONCURRENCY_LEVEL}
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
    data:
      type: conversation_replay
      conversation_replay:
        seed: ${SEED}
        max_model_len: 262144
        num_conversations: ${CONCURRENCY_LEVEL}
        shared_system_prompt_len: 3000 
        dynamic_system_prompt_len:
          type: lognormal
          min: 10000
          max: 990000
          mean: 160000
          std_dev: 233600
        turns_per_conversation:
          type: lognormal
          min: 1
          max: 3000
          mean: 540
          std_dev: 48600
        input_tokens_per_turn:
          type: lognormal
          min: 100
          max: 10000
          mean: 1500
          std_dev: 1200
        output_tokens_per_turn:
          type: lognormal
          min: 50
          max: 10000
          mean: 425
          std_dev: 825
        tool_call_latency_sec:
          type: lognormal
          min: 1
          max: 100
          mean: 15
          std_dev: 55
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
