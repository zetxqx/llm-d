## agentic-serving (GPU / P/D-disaggregated) guide overrides for the llm-d router.
## Layer on top of: recipes/router/base.values.yaml
##
## This deployment serves the agentic code-generation workload on NVIDIA GPUs with
## prefill/decode disaggregation, so the router runs disagg-aware scheduling profiles
## (separate prefill and decode profiles) rather than the single default profile used
## by the non-disaggregated TPU deployment in agentic-serving.values.yaml.

router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    # P/D-disaggregation scheduling (disagg-*, prefill/decode profiles) is only
    # available in the development endpoint-picker image.
    image:
      registry: ghcr.io
      repository: llm-d/llm-d-router-endpoint-picker-dev
      tag: main
      pullPolicy: Always

    flags:
      v: 4

    pluginsConfigFile: "agentic-serving-gpu-plugins.yaml"
    pluginsCustomConfig:
      agentic-serving-gpu-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: disagg-headers-handler
        - type: always-disagg-pd-decider
        - type: disagg-profile-handler
          parameters:
            deciderPluginName: always-disagg-pd-decider
        - type: prefill-filter
        - type: decode-filter
        - type: no-hit-lru-scorer
        - type: approx-prefix-cache-producer
          name: gpu-prefix-cache-producer
        - type: approx-prefix-cache-producer
          name: cpu-prefix-cache-producer
          parameters:
            autoTune: false
            lruCapacityPerServer: 4000000
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: active-request-scorer
        - type: prefix-cache-scorer
          name: gpu-prefix-cache-scorer
          parameters:
            prefixMatchInfoProducerName: gpu-prefix-cache-producer
        - type: prefix-cache-scorer
          name: cpu-prefix-cache-scorer
          parameters:
            prefixMatchInfoProducerName: cpu-prefix-cache-producer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
          - pluginRef: gpu-prefix-cache-scorer
            weight: 4
          - pluginRef: cpu-prefix-cache-scorer
            weight: 2
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: no-hit-lru-scorer
            weight: 1
        - name: decode
          plugins:
          - pluginRef: decode-filter
          - pluginRef: active-request-scorer
            weight: 2
          - pluginRef: gpu-prefix-cache-scorer
            weight: 3
          - pluginRef: cpu-prefix-cache-scorer
            weight: 1

  modelServers:
    matchLabels:
      llm-d.ai/guide: "agentic-serving-gpu"
