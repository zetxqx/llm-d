## agentic-workloads guide overrides for the llm-d router.
## Layer on top of: recipes/router/base.values.yaml

inferenceExtension:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081
  pluginsConfigFile: "agentic-workloads-plugins.yaml"
  pluginsCustomConfig:
    agentic-workloads-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: queue-scorer
          weight: 2
        - pluginRef: kv-cache-utilization-scorer
          weight: 2
        - pluginRef: prefix-cache-scorer
          weight: 3

inferencePool:
  modelServers:
    matchLabels:
      llm-d.ai/guide: "agentic-workloads"
