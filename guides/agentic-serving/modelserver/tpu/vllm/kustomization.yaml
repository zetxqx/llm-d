apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../recipes/modelserver/base/single-host/default

namePrefix: agentic-workloads-tpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: vllm/vllm-tpu
    newTag: nightly-20260501-8e706b2-941fb50

labels:
  - pairs:
      llm-d.ai/guide: agentic-workloads
      llm-d.ai/model: Qwen3-Coder-480B-A35B-Instruct-FP8
      llm-d.ai/accelerator-variant: tpu
      llm-d.ai/accelerator-vendor: google
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true

patches:
  - path: patch-vllm.yaml
