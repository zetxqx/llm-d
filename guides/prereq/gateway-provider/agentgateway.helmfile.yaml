releases:
  - name: agentgateway-crds
    chart: oci://cr.agentgateway.dev/charts/agentgateway-crds
    namespace: agentgateway-system
    version: v1.0.0
    installed: true
    labels:
      type: gateway-provider
      kind: gateway-crds

  - name: agentgateway
    chart: oci://cr.agentgateway.dev/charts/agentgateway
    version: v1.0.0
    namespace: agentgateway-system
    installed: true
    values:
      - inferenceExtension:
          enabled: true
    needs:
      - agentgateway-system/agentgateway-crds
    labels:
      type: gateway-provider
      kind: gateway-control-plane
