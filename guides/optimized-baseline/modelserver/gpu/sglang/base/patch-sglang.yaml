apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 8
  template:
    spec:
      containers:
        - name: modelserver
          command: ["python3", "-m", "sglang.launch_server"]
          args:
            - "--model-path=Qwen/Qwen3-32B"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--enable-metrics"
            - "--tensor-parallel-size=2"
            # Uncomment for distributed tracing
            # - "--enable-trace"
            # - "--otlp-traces-endpoint=http://otel-collector:4317"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
            # # Uncomment for distributed tracing env vars
            # - name: OTEL_SERVICE_NAME
            #   value: "sglang-decode"
            # - name: OTEL_EXPORTER_OTLP_ENDPOINT
            #   value: "http://otel-collector:4317"
            # - name: OTEL_TRACES_EXPORTER
            #   value: "otlp"
            # - name: OTEL_TRACES_SAMPLER
            #   value: "parentbased_traceidratio"
            # - name: OTEL_TRACES_SAMPLER_ARG
            #   value: "0.1"
          resources:
            limits:
              nvidia.com/gpu: "2"
              cpu: "8"
              memory: 64Gi
            requests:
              nvidia.com/gpu: "2"
              cpu: "2"
              memory: 32Gi
          volumeMounts:
            - mountPath: /.config
              name: metrics-volume
            - mountPath: /dev/shm
              name: dshm
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: metrics-volume
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
