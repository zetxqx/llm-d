multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

modelArtifacts:
  uri: "hf://random"
  name: random
  size: 5Mi
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "simulated-accelerators"
    llm-d.ai/accelerator-variant: "cpu"
    llm-d.ai/model: "random"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
    connector: nixlv2
    secure: false

decode:
  create: true
  replicas: 3
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  initContainers:
    - name: uds-tokenizer
      image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
      imagePullPolicy: IfNotPresent
      restartPolicy: Always
      env:
      - name: LOG_LEVEL
        value: "DEBUG"
      - name: PROBE_PORT
        value: "8082"
      ports:
      - name: health
        containerPort: 8082
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8082
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8082
        initialDelaySeconds: 5
        periodSeconds: 5
      volumeMounts:
      - name: uds-socket
        mountPath: /tmp/tokenizer
  containers:
    - name: "vllm"
      image: "ghcr.io/llm-d/llm-d-inference-sim:v0.8.2"
      modelCommand: imageDefault
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
      mountModelVolume: true
      volumeMounts:
      - name: metrics-volume
        mountPath: /.config
      - name: uds-socket
        mountPath: /tmp/tokenizer
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: uds-socket
      emptyDir: {}

prefill:
  create: true
  replicas: 1
  monitoring:
    podmonitor:
      enabled: true
      portName: "vllm"  # prefill vLLM service port (from routing.servicePort)
      path: "/metrics"
      interval: "30s"
  initContainers:
    - name: uds-tokenizer
      image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
      imagePullPolicy: IfNotPresent
      restartPolicy: Always
      env:
      - name: LOG_LEVEL
        value: "DEBUG"
      - name: PROBE_PORT
        value: "8082"
      ports:
      - name: health
        containerPort: 8082
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8082
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8082
        initialDelaySeconds: 5
        periodSeconds: 5
      volumeMounts:
      - name: uds-socket
        mountPath: /tmp/tokenizer
  containers:
    - name: "vllm"
      image: "ghcr.io/llm-d/llm-d-inference-sim:v0.8.2"
      modelCommand: imageDefault
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      mountModelVolume: true
      volumeMounts:
      - name: metrics-volume
        mountPath: /.config
      - name: uds-socket
        mountPath: /tmp/tokenizer
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: uds-socket
      emptyDir: {}

