apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-llm-d-prefill
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "wide-ep-lws"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: DeepSeek-R1-0528
    llm-d.ai/role: prefill
spec:
  replicas: 2
  leaderWorkerTemplate:
    size: 1
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inference-serving: "true"
          llm-d.ai/guide: "wide-ep-lws"
          llm-d.ai/accelerator-variant: "gpu"
          llm-d.ai/accelerator-vendor: "nvidia"
          llm-d.ai/model: DeepSeek-R1-0528
          llm-d.ai/role: prefill
      spec:
        serviceAccountName: deepseek-r1
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi  # roughly 32MB per local DP plus scratch space
          - name: hf-cache
            emptyDir: {}
          - name: jit-cache
            emptyDir: {}
        containers:
          - name: vllm
            image: ghcr.io/llm-d/llm-d-cuda:v0.8.0
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                # Clear /dev/shm on start to prevent running out of space when crashes occur
                # https://github.com/llm-d/llm-d/issues/352
                find /dev/shm -type f -delete

                #################
                # RUN vLLM prefill workers via DP Supervisor
                # The supervisor automatically assigns CUDA_VISIBLE_DEVICES and
                # --data-parallel-rank to each child process based on local_rank.
                #################
                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))

                exec vllm serve \
                  deepseek-ai/DeepSeek-R1-0528 \
                  --host=0.0.0.0 \
                  --port=8000 \
                  --disable-access-log-for-endpoints=/health,/metrics,/v1/models,/readyz \
                  --data-parallel-multi-port-external-lb \
                  --data-parallel-supervisor-port=8008 \
                  --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                  --data-parallel-size-local $DP_SIZE_LOCAL \
                  --data-parallel-start-rank $START_RANK \
                  --data-parallel-address="${LWS_LEADER_ADDRESS}" \
                  --data-parallel-rpc-port=5555 \
                  --enable-expert-parallel \
                  --kv_transfer_config '{"kv_connector":"NixlConnector","kv_role":"kv_both","kv_load_failure_policy":"fail"}' \
                  --all2all-backend deepep_high_throughput \
                  --max-model-len 65536
                  # To enable tracing, add:
                  # --otlp-traces-endpoint http://otel-collector:4317 \
                  # --collect-detailed-traces all
            env:
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: llm-d-hf-token
                    key: HF_TOKEN
              # To enable tracing, uncomment:
              # - name: OTEL_SERVICE_NAME
              #   value: "vllm-prefill"
              # - name: OTEL_EXPORTER_OTLP_ENDPOINT
              #   value: "http://otel-collector:4317"
              # - name: OTEL_TRACES_SAMPLER
              #   value: "parentbased_traceidratio"
              # - name: OTEL_TRACES_SAMPLER_ARG
              #   value: "0.1"
              - name: DP_SIZE_LOCAL
                value: "8"
              - name: TP_SIZE
                value: "1"
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_SKIP_P2P_CHECK
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled
              - name: NVSHMEM_REMOTE_TRANSPORT
                value: ibgda
              - name: NVSHMEM_IB_ENABLE_IBGDA
                value: "true"
              - name: NVSHMEM_BOOTSTRAP_UID_SOCK_IFNAME
                value: eth0
              - name: GLOO_SOCKET_IFNAME
                value: eth0
              - name: NCCL_SOCKET_IFNAME
                value: eth0
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              # Default keep-alive timeout of 5s is shorter than the sidecar's 90s idle conn timeout,
              # causing TCP RSTs.
              - name: VLLM_HTTP_TIMEOUT_KEEP_ALIVE
                value: "120"
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"
              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP

              # Use cache directories from the mounted volume under one easy to mount
              # root directory.
              - name: CUDA_CACHE_PATH
                value: /var/cache/vllm/cuda
              - name: CCACHE_DIR
                value: /var/cache/vllm/ccache
              - name: VLLM_CACHE_ROOT
                value: /var/cache/vllm/vllm
              - name: FLASHINFER_WORKSPACE_BASE
                value: /var/cache/vllm/flashinfer
              # HuggingFace is likely to be quite a bit larger, give it its own cache
              - name: HF_HUB_CACHE
                value: /var/cache/huggingface
            ports:
              - containerPort: 8000
                name: rank0
                protocol: TCP
              - containerPort: 8001
                name: rank1
                protocol: TCP
              - containerPort: 8002
                name: rank2
                protocol: TCP
              - containerPort: 8003
                name: rank3
                protocol: TCP
              - containerPort: 8004
                name: rank4
                protocol: TCP
              - containerPort: 8005
                name: rank5
                protocol: TCP
              - containerPort: 8006
                name: rank6
                protocol: TCP
              - containerPort: 8007
                name: rank7
                protocol: TCP
              - containerPort: 8008
                name: supervisor
                protocol: TCP
            startupProbe:
              httpGet:
                path: /health
                port: supervisor
              initialDelaySeconds: 0
              periodSeconds: 1
              timeoutSeconds: 5
              failureThreshold: 2700
            livenessProbe:
              httpGet:
                path: /health
                port: supervisor
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /readyz
                port: supervisor
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            resources:
              limits:
                ephemeral-storage: 1Ti
                memory: 512Gi
                nvidia.com/gpu: "8"
              requests:
                cpu: 32
                ephemeral-storage: 1Ti
                memory: 512Gi
                nvidia.com/gpu: "8"
            volumeMounts:
              - name: dshm
                mountPath: /dev/shm
              - name: hf-cache
                mountPath: /var/cache/huggingface
              - name: jit-cache
                mountPath: /var/cache/vllm
