router:
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  epp:
    pluginsConfigFile: "wide-ep-lws-config.yaml"
    pluginsCustomConfig:
      wide-ep-lws-config.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: disagg-headers-handler
        - type: always-disagg-pd-decider
        - type: disagg-profile-handler
          parameters:
            deciderPluginName: always-disagg-pd-decider
        - type: prefill-filter
        - type: decode-filter
        - type: prefix-cache-scorer
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: active-request-scorer
        schedulingProfiles:
        - name: prefill
          plugins:
          - pluginRef: prefill-filter
          - pluginRef: prefix-cache-scorer
            weight: 3
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
        - name: decode
          plugins:
          - pluginRef: decode-filter
          - pluginRef: active-request-scorer
            weight: 2
          - pluginRef: prefix-cache-scorer
            weight: 3

  modelServers:
    # targetPorts must list all 8 DP rank ports so the EPP routes requests
    # to all ranks. Without this, only rank 0 receives traffic.
    targetPorts:
      - number: 8000
      - number: 8001
      - number: 8002
      - number: 8003
      - number: 8004
      - number: 8005
      - number: 8006
      - number: 8007
    matchLabels:
      llm-d.ai/guide: "wide-ep-lws"
