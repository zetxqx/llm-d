apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 16
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          args:
            - "openai/gpt-oss-120b"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size=1"
            - "--served-model-name=openai/gpt-oss-120b"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=openai"
            - "--reasoning-parser=openai_gptoss"
            - "--block-size=128"
            - "--max-num-seqs=512"
            - "--kv-transfer-config"
            - '{"kv_connector":"OffloadingConnector","kv_role":"kv_both","kv_connector_extra_config":{"cpu_bytes_to_use":107374182400}}'
          env:
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: LOGNAME
              value: "vllm"
          resources:
            limits:
              cpu: '16'
              memory: 512Gi
              nvidia.com/gpu: 1
            requests:
              cpu: '8'
              memory: 256Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /.triton
              name: triton-cache
            - mountPath: /.local
              name: local-cache
            - mountPath: /.config
              name: config-cache
            - mountPath: /model-cache
              name: model-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: local-cache
          emptyDir: {}
        - name: config-cache
          emptyDir: {}
