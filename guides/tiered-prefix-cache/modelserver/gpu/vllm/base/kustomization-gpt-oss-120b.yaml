apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../recipes/modelserver/base/single-host/default

namePrefix: optimized-baseline-

components:
  - ../../../../../recipes/modelserver/components/images/gpu-vllm

labels:
  - pairs:
      llm-d.ai/model: gpt-oss-120b
      llm-d.ai/guide: tiered-prefix-cache
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true

patches:
  - path: patch-vllm-gpt-oss-120b.yaml
