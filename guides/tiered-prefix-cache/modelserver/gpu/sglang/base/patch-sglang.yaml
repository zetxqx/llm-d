apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 8
  template:
    spec:
      containers:
        - name: modelserver
          command: ["python3", "-m", "sglang.launch_server"]
          args:
            - "--model-path=Qwen/Qwen3-32B"
            - "--host=0.0.0.0"
            - "--port=8000"
            - "--tensor-parallel-size=2"
            # KV-block granularity. Must match the router scorer's
            # tokenProcessorConfig.blockSize (default 64); SGLang's knob is
            # --page-size, where vLLM uses --block-size.
            - "--page-size=64"
            - "--enable-metrics"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            limits:
              nvidia.com/gpu: "2"
              cpu: "16"
              memory: 400Gi
            requests:
              nvidia.com/gpu: "2"
              cpu: "8"
              memory: 200Gi
          volumeMounts:
            - mountPath: /.config
              name: metrics-volume
            - mountPath: /dev/shm
              name: dshm
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: metrics-volume
          emptyDir: {}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
