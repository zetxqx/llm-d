apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Use the CPU offloading base to form a tiered cache structure: HBM - CPU - storage.
  - ../../../../cpu/manifests/vllm/lmcache-connector
patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LMCACHE_LOCAL_DISK
          value: "file:///mnt/files-storage/"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LMCACHE_EXTRA_CONFIG
          value: "{\"use_odirect\":\"True\"}"

# Update the model to Llama-3.3-70B-Instruct to match the benchmarking setup
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value:
          - "vllm"
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - "serve"
          - "meta-llama/Llama-3.3-70B-Instruct"
          - "--tensor-parallel-size"
          - "4"                     # Benchmarking setup uses TP=4
          - "--port"
          - "8000"
          - "--max-num-seq"
          - "1024"
          - "--kv-transfer-config"
          - '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
          - "--enable_prefix_caching"
          - "--gpu-memory-utilization"
          - "0.8"

  # (LMCACHE_MAX_LOCAL_DISK_SIZE)*(number of GPUs) should be <= Backend storage (like Lustre) size
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LMCACHE_MAX_LOCAL_DISK_SIZE
          value: "1120.0"

  # Add PVC volume
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: files-storage
          persistentVolumeClaim:
            claimName: llm-d-kv-cache-storage

  # Mount PVC into container
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: files-storage
          mountPath: /mnt/files-storage

# Update the permission for lustre instance to allow VLLM user to write to Lustre
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: add
        path: /spec/template/spec/initContainers
        value:
          - name: fix-lustre-permissions
            image: busybox:latest
            # Add Write permission to the Group
            command: ["sh", "-c", "chmod -R g+w /mnt/files-storage/"]
            volumeMounts:
            - name: files-storage
              mountPath: /mnt/files-storage