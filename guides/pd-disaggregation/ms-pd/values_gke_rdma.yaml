multinode: false

# Distributed tracing configuration (OpenTelemetry)
# tracing:
#   enabled: true
#   otlpEndpoint: "http://otel-collector:4317"
#   sampling:
#     sampler: "parentbased_traceidratio"
#     samplerArg: "0.1"

modelArtifacts:
  uri: "hf://Qwen/Qwen3-32B"
  name: "Qwen/Qwen3-32B"
  size: 80Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "pd-disaggregation"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "Qwen3-32B"

routing:
  servicePort: 8000
  proxy:
    image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0
    connector: nixlv2
    secure: false

decode:
  create: true
  priorityClassName: nightly-gpu-critical
  replicas: 1
  monitoring:
    podmonitor:
      enabled: false
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  podAnnotations:
    networking.gke.io/default-interface: eth0
    networking.gke.io/interfaces: |
      [
        {"interfaceName":"eth0","network":"default"},
        {"interfaceName":"eth2","network":"rdma-0"},
        {"interfaceName":"eth3","network":"rdma-1"},
        {"interfaceName":"eth4","network":"rdma-2"},
        {"interfaceName":"eth5","network":"rdma-3"},
        {"interfaceName":"eth6","network":"rdma-4"},
        {"interfaceName":"eth7","network":"rdma-5"},
        {"interfaceName":"eth8","network":"rdma-6"},
        {"interfaceName":"eth9","network":"rdma-7"}
      ]
  parallelism:
    tensor: 4
  containers:
  - name: "vllm"
    image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
    modelCommand: custom # Use custom command
    command:
      - /bin/bash
      - -c
    args:
      - |
        source /usr/local/gib/scripts/set_nccl_env.sh
        export LD_LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | sed ':a; N; $!ba; s/\n/:/g'):${LD_LIBRARY_PATH}
        echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
        export LIBRARY_PATH=$(find / -name libcuda.so.1 -printf '%h\n' 2>/dev/null | head -1):${LIBRARY_PATH}
        echo "LIBRARY_PATH=$LIBRARY_PATH"
        vllm serve Qwen/Qwen3-32B \
          --port 8200 \
          --served-model-name "Qwen/Qwen3-32B" \
          --tensor-parallel-size $TP_SIZE \
          --block-size 128 \
          --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}' \
          --no-enable-log-requests \
          --disable-uvicorn-access-log \
          --max-model-len 32000
    env:
      - name: VLLM_NIXL_SIDE_CHANNEL_HOST
        valueFrom:
          fieldRef:
            fieldPath: status.podIP
    ports:
      - containerPort: 8200
        name: vllm
        protocol: TCP
    resources:
      limits:
        cpu: "128"
        memory: 1Ti
        nvidia.com/gpu: "8"
      requests:
        cpu: "128"
        memory: 1Ti
        nvidia.com/gpu: "8"
    mountModelVolume: true
    volumeMounts:
      - mountPath: /usr/local/nvidia
        name: library-dir-host
      - mountPath: /usr/local/gib
        name: gib
      - name: metrics-volume
        mountPath: /.config
      - name: shm
        mountPath: /dev/shm
      - name: torch-compile-cache
        mountPath: /.cache
  volumes:
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 250Gi
    - hostPath:
        path: /home/kubernetes/bin/nvidia
        type: ""
      name: library-dir-host
    - hostPath:
        path: /home/kubernetes/bin/gib
        type: ""
      name: gib
    - name: metrics-volume
      emptyDir: {}
    - name: torch-compile-cache
      emptyDir: {}

