apiVersion: apps/v1
kind: Deployment
metadata:
  name: baseline
  labels:
    app: baseline
spec:
  replicas: 16
  selector:
    matchLabels:
      app: baseline
  template:
    metadata:
      labels:
        app: baseline
    spec:
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.23.0
          imagePullPolicy: IfNotPresent
          command: ["vllm", "serve"]
          args:
            - "openai/gpt-oss-120b"
            - "--gpu-memory-utilization=0.90"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
          resources:
            limits:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
            requests:
              cpu: "8"
              memory: 16Gi
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: baseline
  labels:
    app: baseline
spec:
  type: ClusterIP
  selector:
    app: baseline
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
