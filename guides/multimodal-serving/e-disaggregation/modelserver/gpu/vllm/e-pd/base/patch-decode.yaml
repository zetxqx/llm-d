apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 8
  template:
    spec:
      initContainers:
        - name: routing-proxy
          imagePullPolicy: Always
          args:
            - --port=8000
            - --vllm-port=8200
            - --kv-connector=nixlv2
            - --ec-connector=ec-nixl
            - --zap-log-level=1
            - --secure-proxy=false
          ports:
            - containerPort: 8000
              name: sidecar
              protocol: TCP
          resources: {}
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          imagePullPolicy: Always
          args:
            - "Qwen/Qwen3-VL-32B-Instruct"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size=2"
            - "--mm-processor-cache-gb"
            - "20"
            - "--port=8200"
            - "--ec-transfer-config"
            - '{"ec_connector": "ECCPUConnector", "ec_role": "ec_consumer"}'
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
            # Workaround for https://github.com/vllm-project/vllm/issues/44548, required with vLLM v0.20.0+ due to torch 2.11
            - name: USER
              value: llm-d
          ports:
            - name: modelserver
              containerPort: 8200
              protocol: TCP
            - name: nixl
              containerPort: 5600
              protocol: TCP
          resources:
            limits:
              cpu: "16"
              memory: 256Gi
              nvidia.com/gpu: "2"
            requests:
              cpu: "8"
              memory: 128Gi
              nvidia.com/gpu: "2"
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /.triton
              name: triton-cache
            - mountPath: /.config
              name: config-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
        - name: config-cache
          emptyDir: {}
