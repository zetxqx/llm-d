endpoint:
  stack_name: &stack_name predicted-latency-routing-Qwen3-32B  # user defined name for the stack (results prefix)
  model: &model Qwen/Qwen3-32B        # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace ${NAMESPACE}  # Namespace where stack is deployed
  base_url: &url http://${IP}  # Base URL of inference endpoint
  hf_token_secret: llm-d-hf-token     # The name of secret that contains the HF token of the stack

control:
  work_dir: $HOME/llm-d-bench-work  # working directory to store temporary and autogenerated files.
                                    # Do not edit content manually.
                                    # If not set, a temp directory will be created.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: ${BENCHMARK_PVC}   # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1                  # Number of parallel workload launcher pods to create.
  wait_timeout: 6000              # Time (in seconds) to wait for workload launcher pod to complete before terminating.
                                  # Set to 0 to disable timeout.
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2

env:
  - name: RAYON_NUM_THREADS
    value: "4"

workload:                         # yaml configuration for harness workload(s)
  Code_Generation:
    load:
      type: concurrent
      num_workers: 6
      request_timeout: 300.0
      stages:
        # One concurrency level per run, set via env vars and substituted with envsubst.
        # Keep NUM_REQUESTS = 6 * CONCURRENCY (6 turns per conversation).
        - num_requests: ${NUM_REQUESTS}
          concurrency_level: ${CONCURRENCY}
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: conversation_replay
      conversation_replay:
        seed: ${CONCURRENCY}         # unique seed per concurrency level
        num_conversations: ${CONCURRENCY}   # equals concurrency_level above
        shared_system_prompt_len: 3000
        dynamic_system_prompt_len:
          type: uniform
          min: 15000
          max: 100000
          mean: 55000
          std_dev: 25000
        turns_per_conversation:
          type: normal
          min: 2
          max: 20
          mean: 6
          std_dev: 3.5
        input_tokens_per_turn:
          type: lognormal
          min: 100
          max: 10000
          mean: 1500
          std_dev: 1200
        output_tokens_per_turn:
          type: lognormal
          min: 50
          max: 4000
          mean: 800
          std_dev: 600
        tool_call_latency_sec:
          type: normal
          min: 0
          max: 0
          mean: 0
          std_dev: 0
    report:
      request_lifecycle:
        summary: true
        per_stage: true
        per_request: true
    storage:
      local_storage:
        path: /workspace
