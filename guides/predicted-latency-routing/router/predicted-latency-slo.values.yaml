## Predicted Latency-Based Scheduling — SLO-aware setup (streamingMode: true).
##
## Overrides the chart's default plugin pipeline so predicted-latency-producer
## trains on streaming TPOT samples. Required for x-llm-d-slo-ttft-ms / x-llm-d-slo-tpot-ms
## request headers to be honored. Every request must be sent with
## "stream": true in the body.
##
## For routing-only (no SLO headers), use predicted-latency.values.yaml.

router:
  latencyPredictor:
    enabled: true
  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081
  epp:
    pluginsConfigFile: "predicted-latency-slo-plugins.yaml"
    pluginsCustomConfig:
      predicted-latency-slo-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
        - type: approx-prefix-cache-producer
          parameters:
            # Sized for the 256K-context TPU agentic case (Qwen3-Coder-480B): matching longer
            # prefixes raises the cache-hit rate on long, shared agentic prompts. Tradeoff: it
            # increases per-request prefix-matching work and EPP memory/CPU, most noticeably at
            # high concurrency with very long contexts. For shorter-context GPU/default
            # workloads a smaller value (e.g. 131072, or the chart default) is cheaper and
            # sufficient — lower it to match your max prompt length.
            maxPrefixTokensToMatch: 262144
        - type: predicted-latency-producer
          parameters:
            streamingMode: true
        - type: prefix-cache-affinity-filter
          name: strict-affinity-filter
          parameters:
            affinityThreshold: 0.99
        - type: prefix-cache-affinity-filter
          name: loose-affinity-filter
          parameters:
            affinityThreshold: 0.8
        - type: latency-scorer
        - type: weighted-random-picker
        - type: slo-headroom-tier-filter
        - type: latency-slo-admitter
        schedulingProfiles:
        - name: default
          plugins:
          - pluginRef: predicted-latency-producer
          - pluginRef: strict-affinity-filter
          - pluginRef: slo-headroom-tier-filter
          - pluginRef: loose-affinity-filter
          - pluginRef: latency-scorer
          - pluginRef: weighted-random-picker

  modelServers:
    matchLabels:
      llm-d.ai/guide: "optimized-baseline"
