apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          image: ghcr.io/llm-d/llm-d-cpu:v0.6.0
          # CI-sized default: smaller model chosen for CPU smoke tests.
          # For precise prefix cache scoring to be meaningful, update
          # `modelName` in router/precise-prefix-cache-routing.values.yaml
          # to match `meta-llama/Llama-3.2-3B-Instruct`.
          args:
            - "meta-llama/Llama-3.2-3B-Instruct"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--disable-hybrid-kv-cache-manager"
            - "--max_model_len=8192"
            - "--block-size=64"
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@meta-llama/Llama-3.2-3B-Instruct"}'
            # Uncomment for distributed tracing
            # - "--otlp-traces-endpoint=http://otel-collector:4317"
            # - "--collect-detailed-traces=all"
          ports:
            # Exposed so each router replica can dial the per-pod ZMQ
            # socket bound by vLLM (KV_EVENTS_ENDPOINT=tcp://*:5556).
            - containerPort: 5556
              name: kv-events
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_PORT
              value: "8000"
            # Pod-discovery mode: vLLM PUBs bind per-pod so every router
            # replica can dial each pod's socket independently.
            - name: KV_EVENTS_ENDPOINT
              value: "tcp://*:5556"
            # Disable vLLM usage telemetry — its writes to /.config fail
            # under restricted SecurityContexts (e.g. OpenShift).
            - name: DO_NOT_TRACK
              value: "1"
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "32"
            - name: VLLM_CPU_NUM_OF_RESERVED_CPU
              value: "1"
          securityContext:
            seccompProfile:
              type: Unconfined
            capabilities:
              add:
                - SYS_NICE
          resources:
            limits:
              memory: 64Gi
              cpu: "64"
            requests:
              cpu: "64"
              memory: 64Gi
          volumeMounts:
            - mountPath: /dev/shm
              name: dshm
            - mountPath: /.cache
              name: torch-compile-cache
            # Triton/Inductor caches at /.triton, not writable under
            # restricted SecurityContexts (e.g. OpenShift).
            - mountPath: /.triton
              name: triton-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
