apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          # CI-sized default for Gaudi. HPU typically runs with block-size=128;
          # precise prefix cache scoring requires scorer.tokenProcessorConfig.blockSize
          # to match whatever vLLM is configured with. Update both sides together
          # if you change --block-size here, and update `modelName` in
          # router/precise-prefix-cache-routing.values.yaml to Qwen/Qwen3-8B.
          args:
            - "Qwen/Qwen3-8B"
            - "--block-size=128"
            - "--max-num-seqs=256"
            - "--max-model-len=2048"
            - "--max-num-batched-token=16000"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@Qwen/Qwen3-8B"}'
            # Uncomment for distributed tracing
            # - "--otlp-traces-endpoint=http://otel-collector:4317"
            # - "--collect-detailed-traces=all"
          ports:
            # Exposed so each router replica can dial the per-pod ZMQ
            # socket bound by vLLM (KV_EVENTS_ENDPOINT=tcp://*:5556).
            - containerPort: 5556
              name: kv-events
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_PORT
              value: "8000"
            # Pod-discovery mode: vLLM PUBs bind per-pod so every router
            # replica can dial each pod's socket independently.
            - name: KV_EVENTS_ENDPOINT
              value: "tcp://*:5556"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
            - name: OMPI_MCA_btl_vader_single_copy_mechanism
              value: "none"
            - name: HABANA_LOGS
              value: "/tmp/habana_logs"
            - name: VLLM_SKIP_WARMUP
              value: "true"
            - name: DO_NOT_TRACK
              value: "1"
          resources:
            claims:
              - name: precise-prefix-cache-routing-gaudi-claim
          volumeMounts:
            # Triton/Inductor caches at /.triton, not writable under
            # restricted SecurityContexts (e.g. OpenShift).
            - mountPath: /.triton
              name: triton-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      resourceClaims:
        - name: precise-prefix-cache-routing-gaudi-claim
          resourceClaimTemplateName: precise-prefix-cache-routing-gaudi-claim
      volumes:
        - name: triton-cache
          emptyDir: {}
