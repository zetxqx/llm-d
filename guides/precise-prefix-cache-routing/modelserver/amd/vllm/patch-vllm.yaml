apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 8
  template:
    spec:
      containers:
        - name: modelserver
          command: ["vllm", "serve"]
          args:
            - "Qwen/Qwen3-32B"
            - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
            - "--tensor-parallel-size=2"
            - "--block-size=64"
            - "--kv-events-config"
            - '{"enable_kv_cache_events":true,"publisher":"zmq","endpoint":"$(KV_EVENTS_ENDPOINT)","topic":"kv@$(POD_IP):$(POD_PORT)@Qwen/Qwen3-32B"}'
            # Uncomment for distributed tracing
            # - "--otlp-traces-endpoint=http://otel-collector:4317"
            # - "--collect-detailed-traces=all"
          ports:
            # Exposed so each router replica can dial the per-pod ZMQ
            # socket bound by vLLM (KV_EVENTS_ENDPOINT=tcp://*:5556).
            - containerPort: 5556
              name: kv-events
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_PORT
              value: "8000"
            # Pod-discovery mode: vLLM PUBs bind per-pod so every router
            # replica can dial each pod's socket independently.
            - name: KV_EVENTS_ENDPOINT
              value: "tcp://*:5556"
            # Disable vLLM usage telemetry — its writes to /.config fail
            # under restricted SecurityContexts (e.g. OpenShift).
            - name: DO_NOT_TRACK
              value: "1"
          resources:
            limits:
              cpu: "32"
              memory: 100Gi
              amd.com/gpu: 2
            requests:
              cpu: "32"
              memory: 100Gi
              amd.com/gpu: 2
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            # Triton/Inductor caches at /.triton, not writable under
            # restricted SecurityContexts (e.g. OpenShift).
            - mountPath: /.triton
              name: triton-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 20Gi
        - name: torch-compile-cache
          emptyDir: {}
        - name: triton-cache
          emptyDir: {}
