## precise-prefix-cache-routing guide overrides for the router.
## Layer on top of: recipes/router/base.values.yaml
##
## Pod-discovery mode with active-active HA (replicas: 2). Each replica dials
## every vLLM pod's per-pod ZMQ socket; both indexes converge identically.
## Scale to a single replica with --set router.epp.replicas=1.

router:
  tokenizer:
    enabled: true

  epp:
    replicas: 2
    flags:
      # The chart auto-adds `--ha-enable-leader-election` when replicas > 1,
      # which makes only the leader's readiness probe pass — collapsing to
      # active-passive. Embedding `=false` into the key forces the single-arg
      # form (pflag won't parse `--key value` as a bool); pflag honors
      # last-occurrence wins. No-op when replicas=1.
      ha-enable-leader-election: false
    env:
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: llm-d-hf-token
            key: HF_TOKEN

    pluginsConfigFile: "precise-prefix-cache-routing-plugins.yaml"
    pluginsCustomConfig:
      precise-prefix-cache-routing-plugins.yaml: |
        apiVersion: llm-d.ai/v1alpha1
        kind: EndpointPickerConfig
        plugins:
          - type: tokenizer
            parameters:
              modelName: Qwen/Qwen3-32B
              udsTokenizerConfig:
                socketFile: /tmp/tokenizer/tokenizer-uds.socket
          - type: endpoint-notification-source
          - type: metrics-data-source
          - type: core-metrics-extractor
          - type: single-profile-handler
          - type: decode-filter
          - type: precise-prefix-cache-scorer
            parameters:
              tokenProcessorConfig:
                blockSize: 64           # must match vLLM --block-size
              speculativeIndexing: true
              indexerConfig:
                tokenizersPoolConfig:
                  modelName: Qwen/Qwen3-32B
                  workersCount: 24
                  uds:
                    socketFile: /tmp/tokenizer/tokenizer-uds.socket
                kvBlockIndexConfig:
                  enableMetrics: true
              kvEventsConfig:
                topicFilter: "kv@"
                concurrency: 8
                discoverPods: true
                podDiscoveryConfig:
                  socketPort: 5556
          - type: kv-cache-utilization-scorer
          - type: queue-scorer
          - type: no-hit-lru-scorer
          - type: max-score-picker
        dataLayer:
          sources:
            - pluginRef: metrics-data-source
              extractors:
                - pluginRef: core-metrics-extractor
            - pluginRef: endpoint-notification-source
              extractors:
                - pluginRef: precise-prefix-cache-scorer
        schedulingProfiles:
          - name: default
            plugins:
              - pluginRef: decode-filter
              - pluginRef: kv-cache-utilization-scorer
                weight: 2.0
              - pluginRef: queue-scorer
                weight: 2.0
              - pluginRef: precise-prefix-cache-scorer
                weight: 3.0
              - pluginRef: no-hit-lru-scorer
                weight: 2.0
              - pluginRef: max-score-picker

  extraServicePorts:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8081

  modelServers:
    type: vllm
    targetPorts:
      - number: 8000
    matchLabels:
      llm-d.ai/guide: "precise-prefix-cache-routing"
