name: Nightly - Precise Prefix Cache E2E (GKE)

# Nightly regression test for the precise-prefix-cache-routing guide on GKE.
# Deploys via kustomize + the standalone chart with the UDS tokenizer
# post-renderer; validates with e2e-validate.sh against the scheduler EPP
# service (gateway_host).

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC daily (staggered)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'
      pr_number:
        description: 'PR number for comment-back (set by /test-nightly)'
        required: false
        default: ''
      pr_repo:
        description: 'Repo for PR comment-back'
        required: false
        default: 'llm-d/llm-d'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-precise-prefix-cache-gke
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-gke.yaml@main
    with:
      guide_name: precise-prefix-cache-routing
      namespace: llm-d-nightly-prefix-cache-gke
      gateway_host: 'precise-prefix-cache-routing-epp'
      custom_deploy_script: |
        export GAIE_VERSION=v1.5.0
        export ROUTER_CHART_VERSION=v0
        export GUIDE_NAME="precise-prefix-cache-routing"
        export INFRA_PROVIDER="gke"
        kubectl apply -n ${NAMESPACE} -k guides/${GUIDE_NAME}/modelserver/gpu/vllm/${INFRA_PROVIDER}
        helm install ${GUIDE_NAME} \
          oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev \
          -f guides/recipes/router/base.values.yaml \
          -f guides/${GUIDE_NAME}/router/${GUIDE_NAME}.values.yaml \
          -n ${NAMESPACE} --version ${ROUTER_CHART_VERSION}
      gke_cluster_name: llm-d-e2e-us-east5
      gke_cluster_zone: us-east5
      required_gpus: 2
      recommended_gpus: 4
      accelerator_type: H100
      pod_wait_timeout: '30m'
      pod_readiness_delay: 0
      allow_gpu_preemption: true
      llm_d_ref: ${{ github.ref }}
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
      pr_number: ${{ github.event.inputs.pr_number }}
      pr_repo: ${{ github.event.inputs.pr_repo }}
    secrets: inherit
