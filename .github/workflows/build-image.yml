    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || '' }}

      - name: Load vLLM version from file
        id: common-versions
        run: |
          # Read vLLM version from docker/common-versions file and set as outputs
          source docker/common-versions
          echo "repo=${VLLM_REPO}" >> $GITHUB_OUTPUT
          echo "commit_sha=${VLLM_XPU_COMMIT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set image tag
        id: set-tag
        run: |
          TAG="sha-$(git rev-parse --short HEAD)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          PR_TAG="${{ github.event.pull_request.number }}"
          if [ -n "${PR_TAG}" ]; then
            echo "pr_tag=pr-${PR_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Calculate Cache Bust Timestamp
        id: cache_buster_timestamp
        run: |
          echo "cache_buster_timestamp=$(date)" >> $GITHUB_OUTPUT

      - name: Checkout vLLM source
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ inputs.vllm_commit_sha || steps.common-versions.outputs.commit_sha }}
          path: .cache/vllm-src

      - name: Build and push the image
        id: build-and-push
