name: Nightly - Optimized Baseline E2E (XPU)

# Nightly regression test for the optimized-baseline guide on XPU.

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC daily (3AM PST)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-optimized-baseline-xpu
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-xpu.yaml@main
    with:
      guide_name: optimized-baseline
      namespace: llm-d-nightly-ob-xpu
      scheduler_release_name: optimized-baseline
      scheduler_values_files: |
        guides/recipes/scheduler/base.values.yaml
        guides/optimized-baseline/scheduler/optimized-baseline.values.yaml
      pod_wait_timeout: '10m'
      llm_d_ref: ${{ github.ref }}
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
