name: /test-nightly Slash Command

# Allows running any nightly E2E workflow against a fork PR's code.
#
# Usage: Comment on a PR with:
#   /test-nightly <nightly-name> [key=value ...]   # exact match
#   /test-nightly <glob-pattern> [key=value ...]   # glob pattern (* and ? supported)
#
# Optional parameters (passed to E2E benchmark nightlies, ignored for others):
#   workload=<profile>    Workload profile (default: sanity_random.yaml)
#   decode_pods=<number>  Number of decode pods (default: 1)
#   prefill_pods=<number> Number of prefill pods (default: 1)
#   harness=<name>        Benchmark harness (default: inference-perf)
#
# Examples:
#   /test-nightly pd-disaggregation-ocp
#   /test-nightly *-ocp
#   /test-nightly optimized-baseline-*
#   /test-nightly optimized-baseline-cks workload=sanity_random.yaml decode_pods=1
#   /test-nightly wva-*
#
# The command checks out the PR head, pushes a temp branch
# (test-nightly/pr-<number>) into the main repo, and
# triggers the matching nightly workflow(s) on that branch.
# Temp branches are cleaned up by slash-test-nightly-cleanup.yaml.
#
# Available nightlies are detected dynamically from workflow files
# matching nightly-e2e-<name>.yaml or nightly-<name>.yaml at the PR head,
# so new nightlies added in a PR can be tested immediately.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  actions: write

# Use comment ID in concurrency group so different /test-nightly
# commands on the same PR can run in parallel.
concurrency:
  group: test-nightly-${{ github.event.issue.number }}-${{ github.event.comment.id }}
  cancel-in-progress: false

jobs:
  test-nightly:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/test-nightly')
    runs-on: ubuntu-latest
    steps:
      - name: Parse command
        id: parse
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const comment = context.payload.comment.body.trim();
            const match = comment.match(/^\/test-nightly\s+(\S+)/);
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get the PR head SHA so we can detect workflows added in the PR itself
            const { data: pr } = await github.rest.pulls.get({
              owner, repo,
              pull_number: context.issue.number,
            });
            const prHeadSha = pr.head.sha;

            // Dynamically list all nightly workflows from the repo at the PR head
            async function listAllNightlies() {
              const { data: files } = await github.rest.repos.getContent({
                owner, repo,
                path: '.github/workflows',
                ref: prHeadSha,
              });
              const nightlies = [];
              for (const f of files) {
                let m;
                if ((m = f.name.match(/^nightly-e2e-(.+)\.yaml$/))) {
                  nightlies.push({ name: m[1], workflowFile: f.name });
                } else if ((m = f.name.match(/^nightly-(.+)\.yaml$/))) {
                  nightlies.push({ name: m[1], workflowFile: f.name });
                }
              }
              return nightlies.sort((a, b) => a.name.localeCompare(b.name));
            }

            // Check if a specific nightly exists by probing workflow files
            async function resolveWorkflowFile(name) {
              const candidates = [
                `nightly-e2e-${name}.yaml`,
                `nightly-${name}.yaml`,
              ];
              for (const filename of candidates) {
                try {
                  await github.rest.repos.getContent({
                    owner, repo,
                    path: `.github/workflows/${filename}`,
                    ref: prHeadSha,
                  });
                  return filename;
                } catch (e) {
                  if (e.status !== 404) throw e;
                }
              }
              return null;
            }

            if (!match) {
              const all = await listAllNightlies();
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: [
                  '❌ **Usage**: `/test-nightly <name-or-pattern> [key=value ...]`',
                  '',
                  'Supports exact names or glob patterns (`*` and `?`):',
                  '```',
                  '/test-nightly pd-disaggregation-ocp',
                  '/test-nightly *-ocp',
                  '/test-nightly optimized-baseline-*',
                  '/test-nightly optimized-baseline-cks workload=sanity_random.yaml decode_pods=1',
                  '```',
                  '',
                  'Optional parameters (applied to E2E benchmark nightlies only):',
                  '- `workload=<profile>` — workload profile (default: `sanity_random.yaml`)',
                  '- `decode_pods=<number>` — number of decode pods (default: `1`)',
                  '- `prefill_pods=<number>` — number of prefill pods (default: `1`)',
                  '- `harness=<name>` — benchmark harness (default: `inference-perf`)',
                  '',
                  'Available nightlies:',
                  all.map(n => '`' + n.name + '`').join(', '),
                ].join('\n')
              });
              return 'error';
            }

            const input = match[1];

            // Parse optional key=value parameters (with defaults for quick PR validation)
            const SUPPORTED_PARAMS = ['workload', 'decode_pods', 'prefill_pods', 'harness'];
            const DEFAULT_PARAMS = {
              workload: 'sanity_random.yaml',
              decode_pods: '1',
              prefill_pods: '1',
              harness: 'inference-perf',
            };
            const params = { ...DEFAULT_PARAMS };
            const tokens = comment.split(/\s+/).slice(2);
            for (const token of tokens) {
              const kv = token.match(/^(\w+)=(\S+)$/);
              if (kv && SUPPORTED_PARAMS.includes(kv[1])) {
                params[kv[1]] = kv[2];
              }
            }
            core.setOutput('params', JSON.stringify(params));

            const isGlob = input.includes('*') || input.includes('?');

            let matches;
            if (isGlob) {
              const regexStr = '^' + input
                .replace(/[.+^${}()|[\]\\]/g, '\\$&')
                .replace(/\*/g, '.*')
                .replace(/\?/g, '.')
                + '$';
              const regex = new RegExp(regexStr);
              const all = await listAllNightlies();
              matches = all.filter(n => regex.test(n.name));
            } else {
              const workflowFile = await resolveWorkflowFile(input);
              matches = workflowFile ? [{ name: input, workflowFile }] : [];
            }

            if (matches.length === 0) {
              const all = await listAllNightlies();
              const hint = isGlob
                ? `No nightlies match pattern: \`${input}\``
                : `Unknown nightly: \`${input}\``;
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: context.issue.number,
                body: `❌ ${hint}\n\nAvailable: ${all.map(n => '\`' + n.name + '\`').join(', ')}`
              });
              return 'error';
            }

            core.setOutput('matches', JSON.stringify(matches));
            core.setOutput('match_names', matches.map(m => m.name).join(', '));
            core.setOutput('match_count', matches.length.toString());
            return 'ok';

      - name: Check commenter permission
        if: steps.parse.outputs.result == 'ok'
        id: perm
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: '-1',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ @${context.payload.comment.user.login} needs **write** access to trigger nightlies.`,
              });
              return 'denied';
            }
            return 'ok';

      - name: React with rocket
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Get PR details
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const isFork = pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('is_fork', isFork.toString());
            core.setOutput('pr_number', context.issue.number.toString());

      # Use refs/pull/<N>/head on the base repo instead of checking out the
      # fork repo directly — GITHUB_TOKEN is scoped to the base repo only.
      - name: Checkout PR head
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ steps.pr.outputs.pr_number }}/head
          fetch-depth: 1
          persist-credentials: false

      - name: Push temp branch (fork PRs only)
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        id: branch
        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          MATCH_NAMES: ${{ steps.parse.outputs.match_names }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          IS_FORK: ${{ steps.pr.outputs.is_fork }}
          WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
        run: |
          if [ "$IS_FORK" = "true" ]; then
            if [ -z "$WORKFLOW_TOKEN" ]; then
              echo "::error::Fork PR /test-nightly runs require WORKFLOW_TOKEN to be configured" \
                "with permission to push branches and trigger workflows (for example," \
                "a fine-grained PAT with Contents: write and Actions: write, or a" \
                "classic PAT with repo and workflow scope)."
              exit 1
            fi
            # Include comment ID to avoid races when multiple /test-nightly
            # commands on the same PR run concurrently.
            BRANCH="test-nightly/pr-${PR_NUMBER}-${{ github.event.comment.id }}"
            git remote set-url origin "https://x-access-token:${WORKFLOW_TOKEN}@github.com/${{ github.repository }}.git"
            git checkout -b "$BRANCH"
            # Add an empty commit so the branch tip has a fresh timestamp
            # (used by cleanup to determine branch age)
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "test-nightly: trigger ${MATCH_NAMES} for PR #${PR_NUMBER}"
            git push origin "$BRANCH" --force
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
            echo "is_temp=true" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
            echo "is_temp=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger nightlies and collect run URLs
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        id: trigger
        uses: actions/github-script@v9
        env:
          MATCHES_JSON: ${{ steps.parse.outputs.matches }}
          BRANCH_REF: ${{ steps.branch.outputs.ref }}
          PARAMS_JSON: ${{ steps.parse.outputs.params }}
        with:
          script: |
            const matches = JSON.parse(process.env.MATCHES_JSON);
            const params = JSON.parse(process.env.PARAMS_JSON || '{}');
            const ref = process.env.BRANCH_REF;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const POLL_INTERVAL_MS = 5000;   // 5 seconds between polls
            const MAX_POLL_ATTEMPTS = 12;     // 60 seconds total max wait

            // Record time before dispatching (used to identify new runs)
            const beforeDispatch = new Date();

            // Get the HEAD SHA of the branch so we can correlate runs
            // more precisely than timestamps alone.
            const { data: refData } = await github.rest.git.getRef({
              owner, repo,
              ref: `heads/${ref}`,
            });
            const headSha = refData.object.sha;

            // Dispatch all workflows
            for (const m of matches) {
              // Only send benchmark params to E2E benchmark nightlies (not WVA or utility nightlies)
              const isE2eBenchmark = m.workflowFile.startsWith('nightly-e2e-') && !m.workflowFile.includes('-wva-');
              const benchmarkParams = isE2eBenchmark ? params : {};

              console.log(`Dispatching ${m.workflowFile} on ref ${ref}` +
                (isE2eBenchmark ? ` with params: ${JSON.stringify(benchmarkParams)}` : ''));
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: m.workflowFile,
                  ref,
                  inputs: {
                    pr_number: context.issue.number.toString(),
                    pr_repo: `${context.repo.owner}/${context.repo.repo}`,
                    ...benchmarkParams,
                  },
                });
              } catch (e) {
                if (e.status === 422) {
                  // Workflow doesn't declare pr_number/pr_repo inputs — retry without them
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo,
                    workflow_id: m.workflowFile,
                    ref,
                    inputs: {
                      ...benchmarkParams,
                    },
                  });
                } else {
                  throw e;
                }
              }
              m.runUrl = null;
            }

            // Poll for run URLs — wait for GitHub to create the runs
            for (let attempt = 0; attempt < MAX_POLL_ATTEMPTS; attempt++) {
              await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));

              const pending = matches.filter(m => !m.runUrl);
              if (pending.length === 0) break;

              for (const m of pending) {
                try {
                  const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                    owner, repo,
                    workflow_id: m.workflowFile,
                    branch: ref,
                    per_page: 5,
                  });

                  // Match on head_sha AND creation time to avoid picking
                  // a run from a different concurrent dispatch.
                  const newRun = runs.find(r =>
                    r.head_sha === headSha &&
                    new Date(r.created_at) >= beforeDispatch
                  );
                  if (newRun) {
                    m.runUrl = newRun.html_url;
                    console.log(`Found run for ${m.name}: ${m.runUrl}`);
                  }
                } catch (e) {
                  console.log(`Error polling for ${m.name}: ${e.message}`);
                }
              }
            }

            // Log any that were not found
            for (const m of matches) {
              if (!m.runUrl) {
                console.log(`Warning: could not find run URL for ${m.name} after polling`);
              }
            }

            core.setOutput('results', JSON.stringify(matches));

      - name: Post success comment
        if: steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        uses: actions/github-script@v9
        env:
          TRIGGER_RESULTS: ${{ steps.trigger.outputs.results }}
          BRANCH_REF: ${{ steps.branch.outputs.ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          IS_TEMP: ${{ steps.branch.outputs.is_temp }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          PARAMS_JSON: ${{ steps.parse.outputs.params }}
        with:
          script: |
            const results = JSON.parse(process.env.TRIGGER_RESULTS);
            const params = JSON.parse(process.env.PARAMS_JSON || '{}');
            const ref = process.env.BRANCH_REF;
            const sha = process.env.HEAD_SHA.substring(0, 7);
            const isTemp = process.env.IS_TEMP === 'true';
            const prNumber = parseInt(process.env.PR_NUMBER);
            const repo = `${context.repo.owner}/${context.repo.repo}`;

            function runLink(r) {
              return r.runUrl
                ? `[View run](${r.runUrl})`
                : `[Workflow page](https://github.com/${repo}/actions/workflows/${r.workflowFile})`;
            }

            const lines = [];

            // Show overrides only for E2E benchmark nightlies (those that received params)
            const hasE2eBenchmark = results.some(r =>
              r.workflowFile.startsWith('nightly-e2e-') && !r.workflowFile.includes('-wva-'));
            const paramEntries = Object.entries(params);
            const overridesRow = hasE2eBenchmark && paramEntries.length > 0
              ? `| Overrides | ${paramEntries.map(([k, v]) => `\`${k}=${v}\``).join(', ')} |`
              : null;

            if (results.length === 1) {
              const r = results[0];
              lines.push(
                `🚀 **Nightly triggered**: \`${r.name}\``,
                '',
                '| Detail | Value |',
                '|--------|-------|',
                `| Run | ${runLink(r)} |`,
                `| Workflow | \`${r.workflowFile}\` |`,
                `| Branch | \`${ref}\` |`,
                `| PR HEAD | \`${sha}\` |`,
              );
              if (overridesRow) lines.push(overridesRow);
            } else {
              lines.push(
                `🚀 **${results.length} nightlies triggered**`,
                '',
                '| Nightly | Run |',
                '|---------|-----|',
              );
              for (const r of results) {
                lines.push(`| \`${r.name}\` | ${runLink(r)} |`);
              }
              lines.push(
                '',
                '| Detail | Value |',
                '|--------|-------|',
                `| Branch | \`${ref}\` |`,
                `| PR HEAD | \`${sha}\` |`,
              );
              if (overridesRow) lines.push(overridesRow);
            }

            if (isTemp) {
              lines.push(
                '',
                '> Temp branch will be cleaned up automatically within 24 hours.',
              );
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: lines.join('\n'),
            });

      - name: Post failure comment
        if: failure() && steps.parse.outputs.result == 'ok' && steps.perm.outputs.result == 'ok'
        uses: actions/github-script@v9
        env:
          MATCH_NAMES: ${{ steps.parse.outputs.match_names }}
        with:
          script: |
            const names = process.env.MATCH_NAMES || '(unknown)';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ **Failed to trigger nightly**: \`${names}\`\n\n[View logs](${runUrl})`,
            });
