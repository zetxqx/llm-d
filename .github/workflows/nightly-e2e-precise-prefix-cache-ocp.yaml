name: Nightly - Precise Prefix Cache E2E (OpenShift)

# Nightly regression test for the precise-prefix-cache-routing guide on OpenShift.
# Deploys the guide via custom_deploy_script (kustomize + standalone chart with
# UDS tokenizer post-renderer) and validates with e2e-validate.sh against the
# scheduler EPP service. Mirrors the optimized-baseline CKS/GKE migration in
# llm-d/llm-d#1268; the OCP helmfile reusable workflow doesn't expose a
# `gateway_host` input yet, so pre_deploy_script seeds GATEWAY_HOST via
# GITHUB_ENV.

on:
  schedule:
    - cron: '0 1 * * *'  # 01:00 UTC daily
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'
      pr_number:
        description: 'PR number for comment-back (set by /test-nightly)'
        required: false
        default: ''
      pr_repo:
        description: 'Repo for PR comment-back'
        required: false
        default: 'llm-d/llm-d'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-precise-prefix-cache
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-openshift.yaml@main
    with:
      guide_name: precise-prefix-cache-routing
      namespace: llm-d-nightly-prefix-cache-ocp
      gateway_host: 'precise-prefix-cache-routing-epp'
      custom_deploy_script: |
        export GAIE_VERSION=v1.5.0
        export ROUTER_CHART_VERSION=v0
        export GUIDE_NAME="precise-prefix-cache-routing"
        export INFRA_PROVIDER="base"
        yq '.spec.template.spec.priorityClassName="nightly-gpu-critical"' -i guides/${GUIDE_NAME}/modelserver/gpu/vllm/${INFRA_PROVIDER}/patch-vllm.yaml
        yq '.spec.replicas=2' -i guides/${GUIDE_NAME}/modelserver/gpu/vllm/${INFRA_PROVIDER}/patch-vllm.yaml
        kubectl apply -n ${NAMESPACE} -k guides/${GUIDE_NAME}/modelserver/gpu/vllm/${INFRA_PROVIDER}
        helm install ${GUIDE_NAME} \
          oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev \
          -f guides/recipes/router/base.values.yaml \
          -f guides/${GUIDE_NAME}/router/${GUIDE_NAME}.values.yaml \
          -n ${NAMESPACE} --version ${ROUTER_CHART_VERSION}
      required_gpus: 2
      recommended_gpus: 4
      pod_wait_timeout: '30m'
      pod_readiness_delay: 180
      image_override: 'ghcr.io/llm-d/llm-d-cuda-dev:latest'
      allow_gpu_preemption: true
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
      pr_number: ${{ github.event.inputs.pr_number }}
      pr_repo: ${{ github.event.inputs.pr_repo }}
    secrets: inherit
