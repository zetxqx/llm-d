name: Nightly - Precise Prefix Cache E2E (XPU)

# Nightly regression test for the precise-prefix-cache-aware guide on XPU.

on:
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC daily (staggered)
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: 'Skip cleanup after tests (for debugging)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: nightly-e2e-precise-prefix-cache-xpu
  cancel-in-progress: true

jobs:
  nightly:
    if: github.repository == 'llm-d/llm-d'
    uses: llm-d/llm-d-infra/.github/workflows/reusable-nightly-e2e-xpu.yaml@main
    with:
      guide_name: precise-prefix-cache-aware
      namespace: llm-d-nightly-pc-xpu
      scheduler_release_name: precise-prefix-cache-aware
      scheduler_values_files: |
        guides/recipes/scheduler/base.values.yaml
        guides/precise-prefix-cache-aware/scheduler/precise-prefix-cache-aware.values.yaml
      helm_post_renderer: guides/precise-prefix-cache-aware/scheduler/patches/uds-tokenizer/post-renderer.sh
      pod_wait_timeout: '10m'
      llm_d_ref: ${{ github.ref }}
      skip_cleanup: ${{ github.event.inputs.skip_cleanup == 'true' }}
    secrets: inherit
