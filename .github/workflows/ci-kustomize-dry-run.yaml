name: CI Guide Dry Run

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci-kustomize-dry-run.yaml
      - .github/scripts/**
      - guides/recipes/**
      - guides/optimized-baseline/**
      - guides/pd-disaggregation/**
      - guides/precise-prefix-cache-routing/**
      - guides/workload-autoscaling/**
      - guides/prereq/**
      - helpers/client-setup/**
      - guides/recipes/observability/install-prometheus-grafana.sh
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      optimized-baseline: ${{ steps.filter.outputs.optimized-baseline }}
      pd-disaggregation: ${{ steps.filter.outputs.pd-disaggregation }}
      precise-prefix-cache-routing: ${{ steps.filter.outputs.precise-prefix-cache-routing }}
      workload-autoscaling: ${{ steps.filter.outputs.workload-autoscaling }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            optimized-baseline:
              - .github/workflows/ci-kustomize-dry-run.yaml
              - .github/scripts/install-gke-crds.sh
              - guides/recipes/gateway/install-gateway-crds.sh
              - guides/recipes/observability/install-prometheus-grafana.sh
              - guides/recipes/modelserver/**
              - guides/recipes/router/**
              - guides/optimized-baseline/**
            pd-disaggregation:
              - .github/workflows/ci-kustomize-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/recipes/gateway/install-gateway-crds.sh
              - guides/recipes/observability/install-prometheus-grafana.sh
              - guides/pd-disaggregation/**
            precise-prefix-cache-routing:
              - .github/workflows/ci-kustomize-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/recipes/gateway/install-gateway-crds.sh
              - guides/recipes/observability/install-prometheus-grafana.sh
              - guides/precise-prefix-cache-routing/**
            simulated-accelerators:
              - .github/workflows/ci-kustomize-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/recipes/gateway/install-gateway-crds.sh
              - guides/recipes/observability/install-prometheus-grafana.sh
              - guides/simulated-accelerators/**
            workload-autoscaling:
              - .github/workflows/ci-kustomize-dry-run.yaml
              - .github/scripts/install-gke-crds.sh
              - guides/recipes/gateway/install-gateway-crds.sh
              - guides/recipes/observability/install-prometheus-grafana.sh
              - guides/workload-autoscaling/**

  dry-run-optimized-baseline:
    needs: detect-changes
    if: needs.detect-changes.outputs.optimized-baseline == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/recipes/gateway/install-gateway-crds.sh

      - name: Install monitoring CRDs
        run: guides/recipes/observability/install-prometheus-grafana.sh --crds-only

      - name: Install LWS CRDs
        run: |
          kubectl apply --server-side -f \
            https://raw.githubusercontent.com/kubernetes-sigs/lws/v0.9.0/config/crd/bases/leaderworkerset.x-k8s.io_leaderworkersets.yaml

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run router charts
        run: |
          CHART_VERSION=v0
          failed=0
          for chart in llm-d-router-standalone-dev llm-d-router-gateway-dev; do
            echo ""
            echo "========================================"
            echo "optimized-baseline: router (${chart})"
            echo "========================================"
            echo "--- helm template ---"
            if ! helm template optimized-baseline-router \
              "oci://ghcr.io/llm-d/charts/${chart}" \
              -f guides/recipes/router/base.values.yaml \
              -f guides/recipes/router/features/monitoring.values.yaml \
              -f guides/optimized-baseline/router/optimized-baseline.values.yaml \
              --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
              echo "FAIL: helm template failed for ${chart}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: optimized-baseline / router (${chart})"
            else
              echo "FAIL: optimized-baseline / router (${chart})"
              failed=1
            fi
          done
          exit $failed

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          for overlay_dir in guides/optimized-baseline/modelserver/*/; do
            # Each accelerator dir may have one or more server subdirs (vllm, sglang)
            for kust_dir in "${overlay_dir}"*/; do
              [ -f "${kust_dir}kustomization.yaml" ] || continue
              name="${kust_dir#guides/optimized-baseline/modelserver/}"
              name="${name%/}"
              echo ""
              echo "========================================"
              echo "optimized-baseline: ${name}"
              echo "========================================"
              echo "--- kustomize build ---"
              if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
                echo "FAIL: kustomize build failed for ${name}"
                failed=1
                continue
              fi
              echo "--- kubectl apply --dry-run=server ---"
              if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
                echo "PASS: optimized-baseline / ${name}"
              else
                echo "FAIL: optimized-baseline / ${name}"
                failed=1
              fi
            done
          done
          exit $failed

  dry-run-pd-disaggregation:
    needs: detect-changes
    if: needs.detect-changes.outputs.pd-disaggregation == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install client dependencies
        run: helpers/client-setup/install-deps.sh

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/recipes/gateway/install-gateway-crds.sh

      - name: Install monitoring CRDs
        run: guides/recipes/observability/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run router charts
        run: |
          CHART_VERSION=v0
          failed=0
          for chart in llm-d-router-standalone-dev llm-d-router-gateway-dev; do
            echo ""
            echo "========================================"
            echo "pd-disaggregation: router (${chart})"
            echo "========================================"
            echo "--- helm template ---"
            if ! helm template pd-disaggregation-router \
              "oci://ghcr.io/llm-d/charts/${chart}" \
              -f guides/recipes/router/base.values.yaml \
              -f guides/recipes/router/features/monitoring.values.yaml \
              -f guides/pd-disaggregation/router/pd-disaggregation.values.yaml \
              --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
              echo "FAIL: helm template failed for ${chart}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: pd-disaggregation / router (${chart})"
            else
              echo "FAIL: pd-disaggregation / router (${chart})"
              failed=1
            fi
          done
          exit $failed

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          for overlay_dir in guides/pd-disaggregation/modelserver/*/; do
            overlay_name="$(basename "${overlay_dir%/}")"
            # skip the components directory
            [ "${overlay_name}" = "components" ] && continue
            # Each accelerator dir may have one or more server subdirs (vllm, sglang)
            for kust_dir in "${overlay_dir}"*/; do
              [ -f "${kust_dir}kustomization.yaml" ] || continue
              name="${kust_dir#guides/pd-disaggregation/modelserver/}"
              name="${name%/}"
              echo ""
              echo "========================================"
              echo "pd-disaggregation: ${name}"
              echo "========================================"
              echo "--- kustomize build ---"
              if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
                echo "FAIL: kustomize build failed for ${name}"
                failed=1
                continue
              fi
              echo "--- kubectl apply --dry-run=server ---"
              if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
                echo "PASS: pd-disaggregation / ${name}"
              else
                echo "FAIL: pd-disaggregation / ${name}"
                failed=1
              fi
            done
          done
          exit $failed

  dry-run-precise-prefix-cache-routing:
    needs: detect-changes
    if: needs.detect-changes.outputs.precise-prefix-cache-routing == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/recipes/gateway/install-gateway-crds.sh

      - name: Install monitoring CRDs
        run: guides/recipes/observability/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run router (active-active default)
        # The chart auto-injects the vllm-render sidecar via
        # `router.tokenizer.enabled: true`.
        run: |
          CHART_VERSION=v0
          echo ""
          echo "========================================"
          echo "precise-prefix-cache-routing: router (vllm-render)"
          echo "========================================"
          echo "--- helm template ---"
          if ! helm template precise-prefix-cache-routing \
            "oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev" \
            -f guides/recipes/router/base.values.yaml \
            -f guides/precise-prefix-cache-routing/router/precise-prefix-cache-routing.values.yaml \
            --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
            echo "FAIL: helm template failed"
            exit 1
          fi
          echo "--- kubectl apply --dry-run=server ---"
          if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
            echo "PASS: precise-prefix-cache-routing / router (vllm-render)"
          else
            echo "FAIL: precise-prefix-cache-routing / router (vllm-render)"
            exit 1
          fi

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          base=guides/precise-prefix-cache-routing/modelserver
          # Recurse to any depth: overlays nest unevenly (e.g. amd/vllm/ but
          # gpu/vllm/base/, gpu/vllm/gke/, gpu/sglang/). Find every
          # kustomization.yaml so each backend/server overlay is covered.
          while IFS= read -r -d '' kustfile; do
            kust_dir="${kustfile%kustomization.yaml}"
            name="${kust_dir#"${base}"/}"
            name="${name%/}"
            echo ""
            echo "========================================"
            echo "precise-prefix-cache-routing: ${name}"
            echo "========================================"
            echo "--- kustomize build ---"
            if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
              echo "FAIL: kustomize build failed for ${name}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: precise-prefix-cache-routing / ${name}"
            else
              echo "FAIL: precise-prefix-cache-routing / ${name}"
              failed=1
            fi
          done < <(find "${base}" -name kustomization.yaml -print0 | sort -z)
          exit $failed

  dry-run-workload-autoscaling:
    needs: detect-changes
    if: needs.detect-changes.outputs.workload-autoscaling == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/recipes/gateway/install-gateway-crds.sh

      - name: Install monitoring CRDs
        run: guides/recipes/observability/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Kustomize build and dry-run all WVA platform overlays
        run: |
          failed=0
          for kust_dir in guides/workload-autoscaling/wva-config/platform/*/; do
            [ -f "${kust_dir}kustomization.yaml" ] || continue
            name="${kust_dir#guides/workload-autoscaling/wva-config/platform/}"
            name="${name%/}"
            echo ""
            echo "========================================"
            echo "workload-autoscaling: ${name}"
            echo "========================================"
            echo "--- kustomize build ---"
            if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
              echo "FAIL: kustomize build failed for ${name}"
              failed=1
              continue
            fi
            echo "--- creating namespaces ---"
            grep -E '^\s+namespace:\s' /tmp/rendered.yaml \
              | awk '{print $2}' | tr -d '"'"'" | sort -u \
              | while read -r ns; do
                  kubectl create namespace "$ns" --dry-run=client -o yaml \
                    | kubectl apply -f - 2>/dev/null || true
                done
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: workload-autoscaling / ${name}"
            else
              echo "FAIL: workload-autoscaling / ${name}"
              failed=1
            fi
          done
          exit $failed
