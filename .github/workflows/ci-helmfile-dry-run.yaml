        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Install WVA CRDs
        run: |
          helm show crds oci://ghcr.io/llm-d/workload-variant-autoscaler --version 0.5.1 \
            | kubectl apply --server-side --validate=false -f -

      # Create a dummy TLS cert so workload-autoscaling's readFile for
      # prometheus-ca.crt succeeds during helmfile template.
      - name: Create dummy prometheus CA cert
        run: |
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout /dev/null -out /tmp/prometheus-ca.crt -days 1 -nodes \
            -subj "/CN=dummy-ca" 2>/dev/null

      - name: Dry-run all environments
        env:
          TMPDIR: /tmp
        run: |
          cd guides/workload-autoscaling
          # Extract only the YAML before the --- separator; the rest contains
          # Go template syntax that yq cannot parse.
          envs=$(awk '/^---/{exit} {print}' helmfile.yaml.gotmpl | yq -r '.environments | keys | .[]')
