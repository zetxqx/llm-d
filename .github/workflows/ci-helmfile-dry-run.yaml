            # release namespace, e.g. monitoring).
            {
              helmfile list -e "$env_name" 2>/dev/null | awk 'NR>1 {print $2}'
              grep -E '^\s+namespace:\s' /tmp/rendered.yaml | awk '{print $2}' | tr -d '"'"'"
