name: HPU PD Test

on:
  schedule:
    - cron: '30 4 * * *'  # 4:30 AM UTC daily
  workflow_dispatch:
    inputs:
      pr_or_branch:
        description: 'PR number (e.g. 123 or pr-123) or branch name (e.g. main, feature/xyz) to test'
        required: true
        default: 'main'
        type: string
      custom_image_tag:
        description: 'Tag only (e.g. pr-123, auto-expanded to ghcr.io/<org>/<repo>-hpu-dev:pr-123) or full image address (e.g. ghcr.io/llm-d/llm-d-hpu:v0.5.1). Leave empty to use default from values file'
        required: false
        default: ''
        type: string
  workflow_call:
    inputs:
      pr_or_branch:
        description: 'Pull-request number or branch name to test'
        required: true
        default: 'main'
        type: string
      custom_image_tag:
        description: 'Custom HPU image tag to use (optional)'
        required: false
        default: ''
        type: string

jobs:
  deploy_and_validate:
    if: github.repository == 'llm-d/llm-d'
    runs-on: hpu
    env:
      NAMESPACE: "llm-d-hpu-pd"
      GATEWAY_TYPE: "istio"
      RELEASE_NAME_POSTFIX: "pd"
      INFRA_RELEASE_NAME: "infra-pd"
      GAIE_RELEASE_NAME: "gaie-pd"
      MS_RELEASE_NAME: "ms-pd"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Determine if pr_or_branch is a PR number
        id: check_pr
        env:
          PR_OR_BRANCH: ${{ github.event.inputs.pr_or_branch }}
        shell: bash
        run: |
          echo "PR_OR_BRANCH=${PR_OR_BRANCH:-main}" >> "$GITHUB_ENV"
          # Strip optional 'pr-' prefix so both '704' and 'pr-704' work
          CLEAN="${PR_OR_BRANCH#pr-}"
          if [[ "$CLEAN" =~ ^[0-9]+$ ]]; then
            echo "PR_OR_BRANCH=$CLEAN" >> "$GITHUB_ENV"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" = "pull_request" ]]; then
            echo "PR_OR_BRANCH=${{ github.event.pull_request.number }}" >> $GITHUB_ENV
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch and checkout PR
        if: steps.check_pr.outputs.is_pr == 'true'
        run: |
          git fetch origin pull/"$PR_OR_BRANCH"/head:pr-"$PR_OR_BRANCH"
          git checkout pr-"$PR_OR_BRANCH"

      - name: Checkout branch
        if: steps.check_pr.outputs.is_pr == 'false'
        run: git checkout "$PR_OR_BRANCH"

      - name: Install prerequisites idempotently
        run: |
          ./guides/prereq/client-setup/install-deps.sh | tee ~/install-deps.log

      - name: Install chart dependencies (CRDs and Istio)
        run: |
          cd guides/prereq/gateway-provider
          ./install-gateway-provider-dependencies.sh
          helmfile apply -f istio.helmfile.yaml

      - name: Install monitoring stack
        run: |
          cd docs/monitoring
          ./scripts/install-prometheus-grafana.sh || true

      - name: Create namespace
        run: |
          kubectl create namespace "${NAMESPACE}" || echo "Namespace already exists"

      - name: Create llm-d-hf-token secret
        run: |
          kubectl create secret generic llm-d-hf-token \
            --from-literal="HF_TOKEN=${{ secrets.HF_TOKEN }}" \
            --namespace "${NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tag for deployment
        id: set_image_tag
        run: |
          CUSTOM_TAG="${{ inputs.custom_image_tag }}"
          if [ -n "${CUSTOM_TAG}" ]; then
            # Check if it's a full image address (contains '/') or just a tag
            if [[ "${CUSTOM_TAG}" == *"/"* ]]; then
              echo "Using custom full image address: ${CUSTOM_TAG}"
              FULL_IMAGE="${CUSTOM_TAG}"
            else
              echo "Using custom image tag: ${CUSTOM_TAG}"
              FULL_IMAGE="ghcr.io/${{ github.repository }}-hpu-dev:${CUSTOM_TAG}"
            fi
            echo "IMAGE_TAG=${CUSTOM_TAG}" >> $GITHUB_ENV
            echo "HELM_SET_IMAGE=--set decode.containers[0].image=${FULL_IMAGE} --set decode.containers[0].imagePullPolicy=Always --set prefill.containers[0].image=${FULL_IMAGE} --set prefill.containers[0].imagePullPolicy=Always" >> $GITHUB_ENV
          else
            echo "Using default image tag from values file"
            echo "HELM_SET_IMAGE=" >> $GITHUB_ENV
          fi

      - name: Deploy guide
        run: |
          cd guides/pd-disaggregation
          echo "Starting helmfile deployment for hpu environment..."
          RELEASE_NAME_POSTFIX=${RELEASE_NAME_POSTFIX} \
          helmfile apply -e hpu -n "${NAMESPACE}" ${HELM_SET_IMAGE} \
            --skip-schema-validation 2>&1 \
            | tee ~/pd-hpu-deployment.log
          
          # Check if helmfile command succeeded
          HELMFILE_EXIT_CODE=${PIPESTATUS[0]}
          if [ ${HELMFILE_EXIT_CODE} -ne 0 ]; then
            echo "❌ Helmfile apply failed with exit code: ${HELMFILE_EXIT_CODE}"
            echo "=== Full deployment log ==="
            cat ~/pd-hpu-deployment.log
            exit 1
          fi
          
          echo "---------------------------------------" >> ~/pd-hpu-deployment.log
          
          # Verify releases were created
          echo "✅ Helmfile apply succeeded. Checking deployed releases..."
          helm list -n "${NAMESPACE}"

      - name: fetch helm manifests - prepare for upload
        run: |
          for release_name in "${INFRA_RELEASE_NAME}" "${GAIE_RELEASE_NAME}" "${MS_RELEASE_NAME}"; do
            bash .github/scripts/e2e/helm-get-all.sh \
              ~/pd-hpu-deployment.log \
              "$release_name" \
              "$NAMESPACE" || echo "⚠️  Failed to fetch manifests for $release_name"
          done

      - name: Deploy HTTPRoute
        run: |
          cd guides/pd-disaggregation
          kubectl apply -f httproute.yaml -n "${NAMESPACE}"

      - name: Wait for all pods to be ready
        run: |
          kubectl wait pod \
            --for=condition=Ready \
            --all \
            -n "${NAMESPACE}" \
            --timeout=10m
          echo "✅ All pods are ready."
          kubectl get pods -n "${NAMESPACE}"

      - name: Check gateway pod is up
        run: |
          GATEWAY_POD_READY=$(kubectl get pods -n "${NAMESPACE}" | grep "inference-gateway" | awk '{print $2}')
          if [ "${GATEWAY_POD_READY}" = "1/1" ]; then
              echo "✅ Gateway pod ready."
          else
              echo "❌ Missing gateway pod"
          fi

      - name: Show deployment status
        run: |
          echo "=== Deployments ==="
          kubectl get deployments -n "${NAMESPACE}"
          echo ""
          echo "=== Replica Sets ==="
          kubectl get replicasets -n "${NAMESPACE}"
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n "${NAMESPACE}"
          echo ""
          echo "=== Services ==="
          kubectl get svc -n "${NAMESPACE}"
          echo ""
          echo "=== Helm releases ==="
          helm list -n "${NAMESPACE}" || true
          echo ""
          echo "=== Inference Pools ==="
          kubectl get InferencePool.inference.networking.x-k8s.io -n "${NAMESPACE}" || true
          echo ""
          echo "=== HTTPRoutes ==="
          kubectl get httproutes -n "${NAMESPACE}" || true
          echo ""
          echo "=== Gateway ==="
          kubectl get Gateway -n "${NAMESPACE}" || true
          echo ""
          echo "=== Destination Rule ==="
          kubectl get destinationrule -n "${NAMESPACE}" || true
          echo ""

      - name: Verify installation and run inference tests
        run: |
          cd .github/scripts/e2e
          ./e2e-validate.sh -n "${NAMESPACE}" -v

      - name: Collect and upload Kubernetes pod logs
        if: always()
        run: |
            mkdir -p pod-logs-pd-hpu
            cd pod-logs-pd-hpu
            echo "Fetching ${NAMESPACE} pods log..."
            kubectl get pods -n "${NAMESPACE}" -l "llm-d.ai/inferenceServing" -o yaml > ./inference-pods.yaml
            kubectl logs -n "${NAMESPACE}" -l "llm-d.ai/inferenceServing" | grep -v "waiting for vLLM to be ready" > ./inference-pod-logs.log || true
            kubectl describe pod -n "${NAMESPACE}" -l "llm-d.ai/inferenceServing" > ./inference-describe-pod-logs.log
            kubectl get pods -n "${NAMESPACE}" --no-headers -o custom-columns=":metadata.name" \
            | xargs -I{} sh -c 'kubectl logs --all-containers=true -n "${NAMESPACE}" {} > "{}.log" 2>&1' || true
            echo "Fetching ${NAMESPACE} pods descriptions..."
            kubectl get pods -n "${NAMESPACE}" --no-headers -o custom-columns=":metadata.name" \
            | xargs -I{} sh -c 'kubectl describe pod -n "${NAMESPACE}" {} > "{}-describe.log" 2>&1' || true
            mv ~/pd-hpu-deployment.log . || true
            mv ~/install-deps.log . || true

      - name: Upload pod logs as artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: llmd-pod-logs-pd-hpu
          path: pod-logs-pd-hpu

      - name: Cleanup deployment
        if: always()
        run: |
          cd guides/pd-disaggregation
          helmfile destroy -e hpu -n "${NAMESPACE}"
          kubectl delete ns ${NAMESPACE}
