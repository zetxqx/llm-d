apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-master-store
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: mooncake-master-store
          image: ghcr.io/llm-d/mooncake-master-store:v0.8.0
          command: ["mooncake_master"]
          args:
            - "--config_path=/etc/mooncake/master.yaml"
            # Required for standalone-store (fs) mode — without this the Master
            # rejects MountLocalDiskSegment RPCs from mooncake_client with UNABLE_OFFLOAD.
            # No-op when no client attempts to mount.
            - "--enable_offload"
          env:
            - name: MOONCAKE_SNAPSHOT_LOCAL_PATH
              value: "/data/snapshots"
          ports:
            - name: rpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9003
              protocol: TCP
            - name: metadata
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/mooncake
              readOnly: true
            - name: snapshots
              mountPath: /data/snapshots
      volumes:
        - name: config
          configMap:
            name: mooncake-master-store-config
        - name: snapshots
          persistentVolumeClaim:
            claimName: mooncake-master-store-snapshots
