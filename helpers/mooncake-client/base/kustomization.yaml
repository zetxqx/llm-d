apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mooncake
resources:
  - daemonset.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/name: mooncake-client
      app.kubernetes.io/component: client
      app.kubernetes.io/part-of: mooncake
    includeTemplates: true
    includeSelectors: true

images:
  - name: mooncake-client
    newName: ghcr.io/llm-d/mooncake-master-store
    newTag: v0.8.0
